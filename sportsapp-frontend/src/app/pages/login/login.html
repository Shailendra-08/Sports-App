<div class="login-page">
  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">Welcome Back</h1>
      <p class="hero-subtitle">Sign in to your SportHub account and continue your sports journey!</p>

   <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
  <div class="input-group">
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      email
      [(ngModel)]="formData.email"
      #emailRef="ngModel"
      placeholder="Enter your email"
    />
    <div *ngIf="emailRef.invalid && emailRef.touched" class="error-message">
      <small *ngIf="emailRef.errors?.['required']">Email is required.</small>
      <small *ngIf="emailRef.errors?.['email']">Enter a valid email address.</small>
    </div>
  </div>

  <div class="input-group">
    <label for="password">Password</label>
    <div class="password-wrapper">
      <input
        [type]="showPassword ? 'text' : 'password'"
        id="password"
        name="password"
        required
        minlength="6"
        [(ngModel)]="formData.password"
        #passwordRef="ngModel"
        placeholder="Enter your password"
      />
      <button type="button" (click)="togglePasswordVisibility()" class="toggle-password">
        <!-- Eye icons here -->
      </button>
    </div>
    <div *ngIf="passwordRef.invalid && passwordRef.touched" class="error-message">
      <small *ngIf="passwordRef.errors?.['required']">Password is required.</small>
      <small *ngIf="passwordRef.errors?.['minlength']">Password must be at least 6 characters.</small>
    </div>
  </div>

  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <button type="submit" [disabled]="isLoading || !loginForm.form.valid" class="login-btn">
    <div *ngIf="isLoading" class="spinner"></div>
    <ng-container *ngIf="!isLoading">
      <span>Sign In</span>
    </ng-container>
  </button>

  <div class="register-link">
    <p>Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
</form>

    </div>

    <div class="hero-decoration">
      <div class="floating-card card-1">
        <div class="mini-badge">⚽</div><span>Soccer</span>
      </div>
      <div class="floating-card card-2">
        <div class="mini-badge">🏈</div><span>Football</span>
      </div>
      <div class="floating-card card-3">
        <div class="mini-badge">🏒</div><span>Hockey</span>
      </div>
      <div class="floating-card card-4">
        <div class="mini-badge">🏉</div><span>Rugby</span>
      </div>
    </div>
  </section>
</div>
