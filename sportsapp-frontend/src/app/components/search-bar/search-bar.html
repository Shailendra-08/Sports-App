<div class="text-center text-white py-10 px-4 bg-gradient-to-br from-blue-500 to-green-400 shadow-md">
  <h2 class="text-3xl font-bold mb-2">Discover Sports Leagues</h2>
  <p class="text-lg mb-6">Explore amazing sports leagues from around the world</p>

  <div class="relative w-full sm:w-1/2 mx-auto">
    <input type="text" [placeholder]="placeholder" [(ngModel)]="searchTerm"
      (ngModelChange)="searchTermChange.emit($event)"
      class="w-full p-3 pl-10 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white text-gray-500" />
    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg"
      fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 13.65z" />
    </svg>
  </div>
</div>
